spring.config.import=optional:file:.env[.properties]

spring.application.name=AndefRacing-Backend-Test

spring.datasource.url=${POSTGRES_TEST_URL}
spring.datasource.username=${POSTGRES_TEST_USER}
spring.datasource.password=${POSTGRES_TEST_PASSWORD}

spring.jpa.show-sql=true

jwt.secret-key=${JWT_SECRET_KEY}
jwt.expiration-millis=${JWT_EXPIRATION_MILLIS}

spring.mvc.apiversion.default=1.0.0
spring.mvc.apiversion.use.header=X-Version